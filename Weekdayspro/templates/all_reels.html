{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Reels</title>
<link rel="shortcut icon" href="{% static 'images/fav-icon.png' %}" type="image/png">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="{% static 'css/all_reels_new.css' %}">
</head>
<body data-delete-url-base="{% url 'prop:deleteReel' 0 %}">
{% include 'NavBar.html' %}

{% if reel %}
<div class="reels-container">
    {% for i in reel %}
    <div class="reel-card" id="reel-card-{{ i.id }}">
<video 
    src="{{ i.reel_url }}" 
    muted 
    loop
    class="reel-video"
    data-url="{{ i.reel_url }}"
    data-likes="{{ i.likeCount|default:0 }}"
    data-comments="{{ i.commentCount|default:0 }}"
    data-views="{{ i.view_count|default:0 }}">
</video>
        <div class="reel-info">
            <span><i class="bi bi-eye"></i> {{ i.view_count|default:0 }}</span> 
        </div>

        <div class="more-menu">
            <button class="dots-btn" onclick="toggleDropdown({{ i.id }})">⠇</button>
            <div class="dropdown-content" id="dropdown-{{ i.id }}">
                <button onclick="setEditFormAction('{% url 'prop:edit_reel' i.id %}'); openEditPopup({{ i.id }}, '{{ i.reel_url }}', '{{ i.description|escapejs }}', '{{ i.link|escapejs }}')">Edit</button>
                <button onclick="openDeletePopup({{ i.id }})">Delete</button>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<p style="text-align:center;margin-top:100px;">No reels uploaded yet.</p>
{% endif %}

<!-- ✅ NEW POPUP (REPLACES OLD MODAL) -->
<div id="reelModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); justify-content:center; align-items:center; z-index:999999;">
  <div style="position:relative; width:90%; max-width:420px; background:#000; border-radius:16px; padding:10px;">
    <!-- CLOSE BUTTON -->
    <button id="closeBtn" style="position:absolute; top:10px; right:10px; width:38px; height:38px; border-radius:50%; border:none; background:rgba(0,0,0,0.7); color:#fff; font-size:18px; cursor:pointer; z-index:99999999;">
      <i class="bi bi-x-lg"></i>
    </button>

    <!-- VIDEO -->
    <video id="popupVideo" controls playsinline style="width:100%; border-radius:12px;"></video>

    <!-- STATS -->
    <div style="display:flex; justify-content:space-around; color:#cbd5e1; margin-top:8px; font-size:13px;">
      <span id="viewCount"></span>
      <span id="likeCount"></span>
      <span id="commentCount"></span>
    </div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal" id="editModal">
  <form id="editForm" method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <video id="editVideo" controls style="width:100%; border-radius:8px;"></video>
    <label>Description:</label>
    <textarea id="editDesc" name="description" placeholder="Enter description here"></textarea>
    <label>Link:</label>
    <input id="editLink" type="text" name="link" placeholder="Enter link here">
    <div style="display:flex; justify-content:flex-end; gap:10px; width: fit-content;">
      <button type="submit" class="save-btn">Save</button>
      <button type="button" class="cancel-btn" onclick="closeEditPopup()">Cancel</button>
    </div>
  </form>
</div>
 
<!-- Delete Modal -->
<div class="modal" id="deleteModal">
    <div class="delete-box">
        <h3>Delete Reel?</h3>
        <p>Delete this reel permanently?</p>
        <div class="delete-actions">
            <button id="confirmDeleteBtn" class="delete-btn">Delete</button>
            <button onclick="closeDeletePopup()" class="cancel-btn">Cancel</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

{% include 'footer.html' %}
<script src="{% static 'js/all_reels.js' %}"></script>
</body>
</html>
